explosion.damage = 伤害
explosion.air = 对空
explosion.ground = 对地
explosion.pierce = 穿透
explosion.effect = 效果
lenum.unit = 单位
lenum.unitcount = 单位数
lenum.playercount = 玩家数
lenum.corecount = 核心数
lenum.buildcount = 建筑数
