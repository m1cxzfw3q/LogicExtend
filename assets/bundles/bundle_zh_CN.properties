lst.stringop = 对字符串进行操作
lst.patchop = 对内容包进行操作

selector.sound = 选择音效

lst.createammo = 创建一枚新的弹药\n必须提供一个用于标识该子弹的ID\n可创建的数量无上限
lst.setammo = 修改/删除/在世界中创建这枚子弹\n使用的ID必须与创建子弹中的相同

ammoop.set = 设置子弹的各项属性
ammoop.has = 检查该ID是否拥有对应的子弹
ammoop.load = 从炮台或单位中获取子弹，与[accent]Spawn Bullet[]获取子弹的行为一致
ammoop.create = 在世界中创建这枚子弹
ammoop.remove = 从ID索引中删除对应的子弹

# BulletType
field.le.lifetime = 生命周期，以tick为单位。
field.le.lifescalerandmin = 子弹生成时，生命周期的最小乘数。
field.le.lifescalerandmax = 子弹生成时，生命周期的最大乘数。
field.le.speed = 速度，单位/tick。
field.le.velocityscalerandmin = 子弹生成时，速度的最小乘数。
field.le.velocityscalerandmax = 子弹生成时，速度的最大乘数。
field.le.damage = 击中时造成的直接伤害。
field.le.hitsize = 命中框大小。
field.le.drawsize = 裁剪命中框。
field.le.angleoffset = 每次生成子弹时应用的角度偏移。
field.le.randomangleoffset = 每次生成子弹时应用的角度偏移。
field.le.drag = 阻力，作为速度的分数。
field.le.accel = 每帧的加速度。
field.le.pierce = 是否穿透单位。
field.le.piercebuilding = 是否穿透建筑。
field.le.piercecap = 最大穿透对象数量。
field.le.piercedamagefactor = 每穿透一点生命值，伤害减少的乘数。
field.le.maxdamagefraction = 如果为正，则限制非溅射伤害为目标最大生命值的一部分。
field.le.removeafterpierce = 如果为false，则子弹在超过pierceCap后不会被移除。仅限专家使用。
field.le.laserabsorb = 对于穿透激光，设置为true使其被塑钢墙吸收。
field.le.optimallifefract = 子弹拥有最佳射程/伤害等的生命周期分数。用于激光和连续炮塔。
field.le.layer = 绘制的Z层。
field.le.hiteffect = 直接命中时的效果。
field.le.despawneffect = 子弹消失时的效果。
field.le.shooteffect = 射击时创建的效果。
field.le.shootpattern = 用于发射此子弹的图案。如果为null，则使用炮塔的默认图案。
field.le.chargeeffect = 开始充能时创建的效果；仅适用于具有firstShotDelay/shotDelay的单发武器。
field.le.smokeeffect = 射击时创建的额外烟雾效果。
field.le.shootsound = 如果设置，则覆盖炮塔的射击音效。对单位无效，因为它们不能有多种弹药类型。
field.le.hitsound = 击中某物或被移除时发出的声音。
field.le.despawnsound = 击中某物或被移除时发出的声音。
field.le.hitsoundpitch = 击中时声音的音调。
field.le.hitsoundpitchrange = 击中时声音的音调。
field.le.hitsoundvolume = 击中时声音的音量。
field.le.inaccuracy = 射击时的额外不精确度。
field.le.ammomultiplier = 每个弹药物品/液体生成的子弹数量。
field.le.reloadmultiplier = 乘以炮塔装填速度得到最终射击速度。
field.le.buildingdamagemultiplier = 对地块的基础伤害的乘数。
field.le.shielddamagemultiplier = 对力场护盾的基础伤害的乘数。
field.le.recoil = 射击者的后坐力。
field.le.killshooter = 是否在射击时杀死射击者。用于自杀式炸弹。
field.le.instantdisappear = 是否立即让子弹消失。
field.le.splashdamage = 溅射伤害。0为禁用。
field.le.scaledsplashdamage = 如果为true，溅射伤害会“正确”地受单位命中框大小影响。用于不碰撞或溅射是主要伤害来源的抛射物。
field.le.knockback = 击退速度。
field.le.impact = 击退是否跟随子弹方向。
field.le.status = 击中时施加的状态效果。
field.le.statusduration = 施加的状态效果在持续时间方面的强度。
field.le.targetblocks = 仅炮塔。如果为false，则不会瞄准方块。
field.le.targetmissiles = 仅炮塔。如果为false，则不会瞄准导弹。
field.le.collidestiles = 此子弹类型是否与地块碰撞。
field.le.collidesteam = 此子弹类型是否与同队的地块碰撞。
field.le.collidesair = 此子弹类型是否与空中/地面单位碰撞。
field.le.collidesground = 此子弹类型是否与空中/地面单位碰撞。
field.le.collides = 此子弹类型是否与任何东西碰撞。
field.le.collidefloor = 如果为true，此抛射物与非表面地板碰撞。
field.le.collideterrain = 如果为true，此抛射物与静态墙碰撞。
field.le.keepvelocity = 是否从射击者继承速度。
field.le.scalekeepvelocity = 如果keepVelocity为true，是否按比例减少生命周期以保持射程一致。
field.le.scalelife = 是否缩放生命周期（而非速度）以在目标位置消失。用于火炮。
field.le.hittable = 此子弹是否可以被点防御击中。
field.le.reflectable = 此子弹是否可以被反射。
field.le.absorbable = 此抛射物是否可以被护盾吸收。
field.le.ignorespawnangle = 如果为true，则忽略create中的角度参数。
field.le.createchance = 创建此子弹的概率。
field.le.maxrange = 子弹射程的正值覆盖。
field.le.rangeoverride = 当大于0时，即使小于基础射程也会覆盖射程。
field.le.rangechange = 当用于有多种弹药类型的炮塔时，可以设置为非零值以影响射程。
field.le.extrarangemargin = 当用于应用了limitRange()的炮塔时，这为子弹增加额外射程，超出瞄准范围。仅与原版特别相关。
field.le.range = 在init()中初始化的射程。
field.le.minrangechange = 当用于有多种弹药类型的炮塔时，可以设置为非零值以影响最小射程。
field.le.healpercent = 方块生命值恢复的百分比 *
field.le.healamount = 方块生命值恢复的固定值。
field.le.healsound = 方块被治疗时播放的声音。
field.le.healsoundvolume = 治疗声音的音量。
field.le.lifesteal = 子弹伤害中治疗射击者的比例。
field.le.makefire = 是否在撞击时制造火焰。
field.le.hitunder = 此子弹是否始终击中其下的方块。
field.le.despawnhit = 是否在消失时创建命中效果。如果此子弹有任何特殊效果（如溅射伤害），则强制为true。设置defaults为false以避免覆盖。
field.le.fragonhit = 如果为true，此子弹在击中任何东西时会生成子弹。
field.le.fragondespawn = 如果为true，此子弹在消失时会生成子弹。
field.le.fragonabsorb = 如果为false，此子弹在被护盾吸收时不会生成碎片。
field.le.piercearmor = 如果为true，伤害计算中忽略单位护甲。
field.le.armormultiplier = 乘以伤害计算中使用的单位/建筑护甲。用于护甲弱点、穿甲和反装甲。
field.le.blockarmormultiplier = 仅乘以伤害计算中使用的建筑护甲。
field.le.sticky = 如果为true，子弹会“粘”在敌人身上并在碰撞时停用。
field.le.stickyextralifetime = 子弹粘住某物时增加的额外时间。
field.le.setdefaults = 是否自动设置状态和despawnHit。
field.le.hitshake = 此子弹击中或消失时产生的震动量。
field.le.despawnshake = 此子弹击中或消失时产生的震动量。
field.le.fragbullet = 此子弹过期时创建的子弹类型。
field.le.delayfrags = 如果为true，碎片子弹延迟到下一帧。修复穿透子弹类型立即生成碎片并打乱damage临时变量的隐蔽错误。
field.le.fragrandomspread = 碎片子弹的散射范围（度数）。
field.le.fragspread = 每个碎片子弹之间的均匀散布（度数）。
field.le.fragangle = 碎片子弹的角度偏移。
field.le.fragbullets = 创建的碎片子弹数量。
field.le.fragvelocitymin = 碎片速度的随机范围（乘数）。
field.le.fragvelocitymax = 碎片速度的随机范围（乘数）。
field.le.fraglifemin = 碎片生命周期的随机范围（乘数）。
field.le.fraglifemax = 碎片生命周期的随机范围（乘数）。
field.le.fragoffsetmin = 碎片子弹相对于父子弹的随机偏移。
field.le.fragoffsetmax = 碎片子弹相对于父子弹的随机偏移。
field.le.piercefragcap = 如果pierce为true，此子弹可以释放碎片子弹的次数。
field.le.intervalbullet = 按固定间隔创建的子弹。
field.le.bulletinterval = 子弹生成的间隔，以tick为单位。
field.le.intervalbullets = 每个间隔生成的子弹数量。
field.le.intervalrandomspread = 间隔子弹的随机角度。
field.le.intervalspread = 单个间隔子弹之间的角度散布。
field.le.intervalangle = 间隔子弹的角度偏移。
field.le.intervaldelay = 使用负值禁用间隔子弹延迟。
field.le.underwater = 如果为true，此子弹在水下渲染。高度实验性！
field.le.hitcolor = 用于击中/消失效果的颜色。
field.le.healcolor = 用于方块治疗效果的颜色。
field.le.healeffect = 在被治疗的方块上发射的效果。
field.le.spawnbullets = 创建此子弹时生成的子弹。很少需要，用于视觉效果。
field.le.showstats = 是否显示生成的子弹的属性。
field.le.spawnbulletrandomspread = 生成子弹的随机角度散布。
field.le.spawnunit = 替代此子弹生成的单位。用于导弹。
field.le.despawnunit = 此子弹击中某物或因生命周期结束而消失时生成的单位。
field.le.despawnunitchance = 生成消失单位的概率。
field.le.despawnunitcount = 此子弹消失时生成的单位数量。
field.le.despawnunitradius = 与原始子弹消失/命中坐标的随机偏移距离。
field.le.faceoutwards = 如果为true，此子弹消失时生成的单位背对子弹，而不是与子弹同向。
field.le.parts = 此子弹的额外视觉部件。
field.le.trailcolor = 子弹尾迹的颜色。
field.le.trailchance = 每tick尾迹效果生成的概率。
field.le.trailinterval = 尾迹效果生成的均匀间隔。
field.le.trailminvelocity = 尾迹效果生成所需的最小速度。
field.le.traileffect = 生成的尾迹效果。
field.le.trailspread = 尾迹效果的随机偏移。
field.le.trailparam = 传递给尾迹的旋转/大小参数。通常控制大小。
field.le.trailrotation = 传递给尾迹的参数是子弹旋转，而不是固定值。
field.le.trailinterp = 尾迹宽度作为子弹生命周期函数的插值。
field.le.traillength = 尾迹四边形的长度。任何<=0的值禁用尾迹。
field.le.trailwidth = 尾迹宽度，如果trailLength > 0。
field.le.trailsinmag = 如果trailSinMag > 0，这些值作为正弦曲线应用于尾迹宽度。
field.le.trailsinscl = 如果trailSinMag > 0，这些值作为正弦曲线应用于尾迹宽度。
field.le.circleshooter = 如果为true，子弹将尝试围绕其射击实体盘旋。
field.le.circleshooterradius = 子弹尝试盘旋的半径。
field.le.circleshooterradiussmooth = 盘旋的平滑额外半径值。
field.le.circleshooterrotatespeed = 用于调整盘旋时速度的速度乘数。
field.le.splashdamageradius = 使用负值禁用溅射伤害。
field.le.splashdamagepierce = 如果为true，溅射伤害穿透地块。
field.le.incendamount = 在子弹周围尝试生成的火焰数量。
field.le.incendspread = 子弹周围火焰的散布。
field.le.incendchance = 生成火焰的概率。
field.le.homingpower = 子弹制导能力的力量。通常为0到1之间的数值；尝试0.1作为起点。
field.le.homingrange = 子弹周围制导效果的范围。
field.le.homingdelay = 使用负值禁用制导延迟。
field.le.followaimspeed = 子弹旋转以跟随光标的速率。<=0禁用。
field.le.suppressionrange = 治疗方块抑制效果的范围。
field.le.suppressionduration = 治疗方块抑制效果的持续时间。
field.le.suppressioneffectchance = 抑制效果在方块上发生的概率，按方块数量缩放。
field.le.suppresscolor = 用于regenSuppressSeek效果的颜色。
field.le.lightningcolor = 子弹产生的闪电的颜色。
field.le.lightning = 独立的闪电“根”数量。
field.le.lightninglength = 每根闪电的长度。
field.le.lightninglengthrand = 在基础长度上增加的额外随机长度。
field.le.lightningdamage = 使用负值使用默认子弹伤害。
field.le.lightningcone = 闪电相对于子弹旋转的散布。
field.le.lightningangle = 闪电相对于子弹旋转的角度偏移。
field.le.lightningtype = 在闪电点处创建的子弹。
field.le.weavescale = 子弹摆动模式的尺度。越高->振动越小。
field.le.weavemag = 子弹摆动的强度。注意这可能使子弹不精确。
field.le.weaverandom = 如果为true，子弹摆动会在生成时随机改变方向。
field.le.rotatespeed = 子弹速度在飞行中的旋转速度。
field.le.puddles = 创建的独立液体池数量。
field.le.puddlerange = 子弹周围液体池的范围。
field.le.puddleamount = 每个创建的液体池的液体量。
field.le.puddleliquid = 创建液体池所用的液体。
field.le.displayammomultiplier = 是否在其属性中显示此子弹类型的弹药乘数。
field.le.statliquidconsumed = 如果>0，则显示为除以弹药乘数。
field.le.lightradius = 此子弹发出的光的半径；<0使用默认值。
field.le.lightopacity = 光颜色的不透明度。
field.le.lightcolor = 此子弹发出的光的颜色。

## MultiBulletType
field.le.repeat = 子弹数组重复的次数。

## ContinuousBulletType
field.le.timescaledamage = 如果由建筑发射，是否将伤害乘以它的时间缩放。

## ContinuousFlameBulletType
field.le.lengthwidthpans = 长度、宽度、椭圆平移和偏移，均为基本宽度和长度的分数。存储为交错数组：LWPO1 LWPO2 LWPO3...

